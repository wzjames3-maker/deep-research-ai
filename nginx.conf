worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker DNS resolver — 运行时解析容器名（避免 app 容器重启后 IP 变化导致 502）
    resolver 127.0.0.11 valid=30s ipv6=off;

    # 不记录包含 ticket 参数的 query string（避免 SSE ticket 泄露到 access log）
    map $arg_ticket $safe_query {
        "~."    "?ticket=***";
        default  "";
    }

    log_format secure_log '$remote_addr - [$time_local] "$request_method $uri$safe_query $server_protocol" '
                          '$status $body_bytes_sent "$http_referer"';

    access_log /var/log/nginx/access.log secure_log;
    error_log  /var/log/nginx/error.log  warn;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;

        # ============================================================
        # API 反向代理 → FastAPI (app:8000)
        # ============================================================
        location /api/ {
            set $upstream_app app:8000;
            proxy_pass http://$upstream_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # ============================================================
        # SSE 流端点 — 长连接不缓冲（比 /api/ 更具体的前缀优先匹配）
        # ============================================================
        location /api/v1/research/ {
            set $upstream_app app:8000;
            proxy_pass                  http://$upstream_app;
            proxy_http_version          1.1;
            proxy_set_header            Connection "";
            proxy_buffering             off;
            proxy_cache                 off;
            chunked_transfer_encoding   on;
            proxy_read_timeout          600s;
            proxy_set_header            Host $host;
            proxy_set_header            X-Real-IP $remote_addr;
            proxy_set_header            X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ============================================================
        # 前端静态文件 — 生产模式: frontend/dist/ 映射到容器
        # ============================================================
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
